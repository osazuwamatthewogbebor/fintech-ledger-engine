services:
  ledger_postgres:
    image: postgres:15-alpine
    container_name: ledger_postgres
    environment:
      - POSTGRES_USER=ledger_admin
      - POSTGRES_PASSWORD=ledger_secure_pass
      - POSTGRES_DB=fintech_ledger_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger_admin -d fintech_ledger_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ledger_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ledger_network
  
  ledger_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger_app
    ports:
      - "5000:3000"
    environment:
      - PORT=3000
      - DB_USER=ledger_admin
      - DB_PASSWORD=ledger_secure_pass
      - DB_HOST=ledger_postgres
      - DB_PORT=5432
      - DB_NAME=fintech_ledger_db
    depends_on:
      ledger_postgres:
        condition: service_healthy
    networks:
      - ledger_network
volumes:
  ledger_pg_data:

networks:
  ledger_network:
    driver: bridge

